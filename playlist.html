<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Showreel</title>
  <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0E1A2B;
      color: #F3EFE6;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
    }

    .section {
      margin-bottom: 32px;
    }

    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #F3EFE6;
    }

    .player-box {
      background: rgba(243, 239, 230, 0.04);
      border: 1px solid rgba(243, 239, 230, 0.12);
      border-radius: 14px;
      padding: 16px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .play-btn {
      appearance: none;
      border: 1px solid #B79A5B;
      background: transparent;
      color: #F3EFE6;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
    }

    .play-btn:hover {
      background: rgba(183, 154, 91, 0.14);
    }

    .track-label {
      font-size: 14px;
      opacity: 0.95;
    }

    .waveform {
      width: 100%;
      height: 128px;
      cursor: pointer;
    }

    .playlist {
      margin-top: 14px;
      display: grid;
      gap: 8px;
    }

    .track-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(243, 239, 230, 0.03);
      border: 1px solid rgba(243, 239, 230, 0.08);
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .track-row:hover {
      background: rgba(243, 239, 230, 0.06);
      border-color: rgba(183, 154, 91, 0.35);
    }

    .track-row.active {
      background: rgba(183, 154, 91, 0.12);
      border-color: rgba(183, 154, 91, 0.55);
    }

    .track-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .track-title {
      font-size: 14px;
      color: #F3EFE6;
    }

    .track-subtitle {
      font-size: 12px;
      color: rgba(243, 239, 230, 0.7);
    }

    .track-action {
      font-size: 12px;
      color: #B79A5B;
      white-space: nowrap;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(243, 239, 230, 0.75);
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="section">
      <h2>Medley</h2>
      <div class="player-box">
        <div class="topbar">
          <button id="medleyBtn" class="play-btn" type="button">Play</button>
          <div class="track-label">Featured Medley</div>
        </div>
        <div id="medleyWave" class="waveform"></div>
      </div>
    </div>

    <div class="section">
      <h2>Selected Cues</h2>
      <div class="player-box">
        <div class="topbar">
          <button id="playlistBtn" class="play-btn" type="button">Play</button>
          <div id="playlistLabel" class="track-label">Select a Track</div>
        </div>
        <div id="playlistWave" class="waveform"></div>

        <div class="playlist" id="playlist">
          <div class="track-row" data-file="./01%20BLACK%20BAGS%20%20-%20%20I%20Get%20to%20Wear%20Nice%20Gloves.mp3" data-title="BLACK BAGS - I Get to Wear Nice Gloves" data-subtitle="Lyrical / reflective">
            <div class="track-info">
              <div class="track-title">1. BLACK BAGS - I Get to Wear Nice Gloves</div>
              <div class="track-subtitle">Upbeat, Calm, and Reflective</div>
            </div>
            <div class="track-action">Load</div>
          </div>

          <div class="track-row" data-file="./02%20BLACK%20BAGS%20%20-%20%20Boone%2C%20End%20of%20the%20Line.mp3" data-title="BLACK BAGS - Boone, End of the Line" data-subtitle="Suspense / tension">
            <div class="track-info">
              <div class="track-title">2. BLACK BAGS - Boone, End of the Line</div>
              <div class="track-subtitle">Suspense / tension</div>
            </div>
            <div class="track-action">Load</div>
          </div>

          <div class="track-row" data-file="./track3.mp3" data-title="Track Three" data-subtitle="Action / orchestral">
            <div class="track-info">
              <div class="track-title">Track Three</div>
              <div class="track-subtitle">Action / orchestral</div>
            </div>
            <div class="track-action">Load</div>
          </div>
        </div>

        <div id="status" class="status">Playlist ready.</div>
      </div>
    </div>

  </div>

  <script>
    window.addEventListener("load", function () {
      const medleyBtn = document.getElementById("medleyBtn");
      const playlistBtn = document.getElementById("playlistBtn");
      const playlistLabel = document.getElementById("playlistLabel");
      const status = document.getElementById("status");
      const trackRows = Array.from(document.querySelectorAll(".track-row"));

      const medleyPlayer = WaveSurfer.create({
        container: "#medleyWave",
        height: 128,
        normalize: true,
        waveColor: "#F3EFE6",
        progressColor: "#B79A5B",
        cursorColor: "#B79A5B",
        cursorWidth: 2,
        fillParent: true,
        interact: true,
        autoScroll: true,
        autoCenter: true,
        url: "./Showreel-Medley.mp3"
      });

      const playlistPlayer = WaveSurfer.create({
        container: "#playlistWave",
        height: 128,
        normalize: true,
        waveColor: "#F3EFE6",
        progressColor: "#B79A5B",
        cursorColor: "#B79A5B",
        cursorWidth: 2,
        fillParent: true,
        interact: true,
        autoScroll: true,
        autoCenter: true
      });

      function pauseOtherPlayers(active) {
        if (active !== medleyPlayer && medleyPlayer.isPlaying()) medleyPlayer.pause();
        if (active !== playlistPlayer && playlistPlayer.isPlaying()) playlistPlayer.pause();
      }

      function clearActiveTracks() {
        trackRows.forEach(row => row.classList.remove("active"));
      }

      medleyBtn.addEventListener("click", function () {
        pauseOtherPlayers(medleyPlayer);
        medleyPlayer.playPause();
      });

      playlistBtn.addEventListener("click", function () {
        pauseOtherPlayers(playlistPlayer);
        playlistPlayer.playPause();
      });

      medleyPlayer.on("interaction", function () {
        pauseOtherPlayers(medleyPlayer);
        if (!medleyPlayer.isPlaying()) medleyPlayer.play();
      });

      playlistPlayer.on("interaction", function () {
        pauseOtherPlayers(playlistPlayer);
        if (!playlistPlayer.isPlaying()) playlistPlayer.play();
      });

      medleyPlayer.on("play", function () {
        medleyBtn.textContent = "Pause";
      });

      medleyPlayer.on("pause", function () {
        medleyBtn.textContent = "Play";
      });

      medleyPlayer.on("finish", function () {
        medleyBtn.textContent = "Play";
      });

      playlistPlayer.on("play", function () {
        playlistBtn.textContent = "Pause";
      });

      playlistPlayer.on("pause", function () {
        playlistBtn.textContent = "Play";
      });

      playlistPlayer.on("finish", function () {
        playlistBtn.textContent = "Play";
      });

      trackRows.forEach(function (row) {
        row.addEventListener("click", function () {
          const file = row.dataset.file;
          const title = row.dataset.title;
          const subtitle = row.dataset.subtitle || "";

          pauseOtherPlayers(playlistPlayer);
          clearActiveTracks();
          row.classList.add("active");

          playlistLabel.textContent = title;
          status.textContent = subtitle ? subtitle : "Loaded.";

          playlistPlayer.load(file);
        });
      });

      playlistPlayer.on("ready", function () {
        playlistPlayer.play();
      });

      playlistPlayer.on("error", function (err) {
        status.textContent = "Error loading track: " + err;
      });

      medleyPlayer.on("error", function (err) {
        status.textContent = "Error loading medley: " + err;
      });
    });
  </script>
</body>
</html>
