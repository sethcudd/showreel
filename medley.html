<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Showreel Medley</title>
  <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .player-wrap {
      width: 100%;
      padding: 0;
      margin: 0;
    }

    #waveform {
      width: 100%;
      height: 128px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="player-wrap">
    <div id="waveform"></div>
  </div>

  <script>
    window.addEventListener("load", function () {
      WaveSurfer.create({
        container: "#waveform",
        height: 128,
        normalize: true,
        waveColor: "#F3EFE6",
        progressColor: "#B79A5B",
        cursorColor: "#F3EFE6",
        cursorWidth: 2,
        fillParent: true,
        interact: true,
        autoScroll: true,
        autoCenter: true,
        url: "./Showreel-Medley.mp3"
      });
    });
  </script>
</body>
</html>
