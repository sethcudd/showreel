<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Medley</title>
  <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0E1A2B;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .player-wrap {
      width: 100%;
      padding: 18px 18px 12px 18px;
      box-sizing: border-box;
      background: #0E1A2B;
      color: #F3EFE6;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    button {
      appearance: none;
      border: 1px solid #B79A5B;
      background: transparent;
      color: #F3EFE6;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: rgba(183, 154, 91, 0.12);
    }

    .label {
      font-size: 14px;
      opacity: 0.9;
    }

    #waveform {
      width: 100%;
      height: 128px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="player-wrap">
    <div class="topbar">
      <button id="playBtn" type="button">Play</button>
      <div class="label">Showreel Medley</div>
    </div>

    <div id="waveform"></div>
  </div>

  <script>
    window.addEventListener("load", function () {
      const playBtn = document.getElementById("playBtn");

      const wavesurfer = WaveSurfer.create({
        container: "#waveform",
        height: 128,
        normalize: true,
        waveColor: "#F3EFE6",
        progressColor: "#5C6E86",
        cursorColor: "#B79A5B",
        cursorWidth: 2,
        fillParent: true,
        interact: true,
        autoScroll: true,
        autoCenter: true,
        url: "./Showreel-Medley.mp3"
      });

      playBtn.addEventListener("click", function () {
        wavesurfer.playPause();
      });

      wavesurfer.on("play", function () {
        playBtn.textContent = "Pause";
      });

      wavesurfer.on("pause", function () {
        playBtn.textContent = "Play";
      });

      wavesurfer.on("finish", function () {
        playBtn.textContent = "Play";
      });

      wavesurfer.on("interaction", function () {
        if (!wavesurfer.isPlaying()) {
          wavesurfer.play();
        }
      });
    });
  </script>
</body>
</html>
